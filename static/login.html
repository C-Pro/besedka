<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - {{CHATNAME}}</title>
    <meta name="description" content="Log in to your Besedka chat account.">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#0f1117">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="{{CHATNAME}}">
</head>

<body>
    <div id="login-app">
        <main class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <img src="/besedka.png" alt="Logo" class="login-logo" width="80" height="80">
                    <h1>Login - {{CHATNAME}}</h1>
                </div>
                <div id="error-message" class="error-message" style="display: none;"></div>

                <form id="login-form" onsubmit="event.preventDefault();">
                    <input type="text" id="username" placeholder="Username" autocomplete="username webauthn">
                    <input type="password" id="password" placeholder="Password" autocomplete="current-password">
                    <input type="text" id="otp" placeholder="OTP (6 digits)">

                    <button type="submit" id="login-btn">Login</button>
                    
                    <div style="margin: 15px 0; text-align: center; color: #888;">or</div>
                    
                    <button type="button" id="passkey-login-btn" class="btn btn-secondary" style="width: 100%;">Sign in with Passkey</button>
                </form>
            </div>
        </main>
    </div>
    <script type="module" src="js/login.js"></script>
</body>

</html>
